<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RenderMD</title>
    <script type="module" src="/src/main.ts"></script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="headerbar">
        <div class="hb-left">
          <button id="btn-open" title="Open (Ctrl+O)">Open</button>
          <button id="btn-save" title="Save (Ctrl+S)">Save</button>
        </div>
        <div class="hb-title" id="title">RenderMD</div>
        <div class="hb-right">
          <button id="btn-toggle" title="Toggle edit/preview (F5)">Edit</button>
          <div class="hb-menu-wrap">
            <button id="btn-menu" title="Menu">☰</button>
            <div id="app-menu" hidden>
              <button data-action="new">New <span>Ctrl+N</span></button>
              <button data-action="open">Open… <span>Ctrl+O</span></button>
              <button data-action="save">Save <span>Ctrl+S</span></button>
              <button data-action="save-as">Save As… <span>Ctrl+Shift+S</span></button>
              <hr />
              <button data-action="export-html">Export HTML…</button>
              <button data-action="print">Print / PDF…</button>
              <hr />
              <button data-action="toggle-history">History rail <span>Ctrl+Alt+H</span></button>
              <hr />
              <button data-action="install-update" id="menu-update" hidden>
                Update available <span id="menu-update-ver"></span>
              </button>
              <button data-action="check-updates">Check for updates</button>
              <button data-action="shortcuts">Keyboard shortcuts <span>Ctrl+?</span></button>
              <button data-action="about">About RenderMD</button>
            </div>
          </div>
        </div>
      </header>
      <main id="content">
        <div id="editor-pane" hidden></div>
        <!-- allow-scripts (mermaid, table-edit JS, the bridge) but NOT
             allow-same-origin: the frame gets an opaque origin, so
             preview:// subresources are cross-origin and can't be read back
             via canvas.toDataURL() — closing the file-exfil path. -->
        <iframe id="preview-pane" title="Preview" sandbox="allow-scripts"></iframe>
      </main>
      <footer id="statusbar">
        <span id="status-path">No file</span>
        <button id="status-update" hidden title="Download and install, then restart"></button>
        <span id="status-mtime"></span>
        <span id="status-mode">Preview</span>
      </footer>
    </div>
  </body>
</html>
