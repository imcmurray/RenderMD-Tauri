name: release

# Builds and attaches installers for all three OSes to a draft GitHub
# release whenever a version tag is pushed:
#   git tag v2.0.0-alpha.1 && git push origin v2.0.0-alpha.1
#
# Artifacts: .dmg (macOS universal), .msi + NSIS setup.exe (Windows),
# .AppImage / .deb / .rpm (Linux, built on ubuntu-22.04 for the widest
# glibc compatibility; requires webkit2gtk-4.1 at runtime).
#
# Builds are UNSIGNED for now. Signing drops in later without touching the
# workflow shape: macOS via APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY /
# APPLE_ID envs on the tauri-action step (it picks them up automatically),
# Windows via bundle.windows.signCommand in tauri.conf.json.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    # Third-party actions are pinned to full commit SHAs: this job holds the
    # code-signing private key (TAURI_SIGNING_PRIVATE_KEY) — the single
    # secret the entire update-signature guarantee rests on — so a hijacked
    # floating tag must not be able to run in this context and exfiltrate it.
    # Bump these deliberately (Dependabot for github-actions keeps them fresh).
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable @ 2026-07
        with:
          # Both architectures for the macOS universal binary; harmless
          # no-ops elsewhere.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Tauri Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: ". -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (latest.json + per-platform .sig files).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RenderMD ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          releaseBody: |
            ### Installing unsigned builds

            **macOS**: the .dmg is not notarized yet. If Gatekeeper says the
            app "is damaged", clear the quarantine flag:
            `xattr -cr /Applications/RenderMD.app` — or right-click the app
            and choose Open.

            **Windows**: SmartScreen will show "Windows protected your PC".
            Click *More info* → *Run anyway*.

            **Linux**: the AppImage needs `webkit2gtk-4.1` installed from
            your distro (e.g. `pacman -S webkit2gtk-4.1`,
            `apt install libwebkit2gtk-4.1-0`).
          args: ${{ matrix.args }}
