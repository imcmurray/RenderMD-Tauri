name: check

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The core crate is pure Rust — no system libraries, fast feedback.
  core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Verify vendored mermaid bundle integrity
        run: |
          cd src-tauri/assets
          sha256sum -c mermaid.min.js.sha256
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (core)
        run: cargo clippy -p rendermd-core --all-targets -- -D warnings
      - name: test (core)
        run: cargo test -p rendermd-core --locked

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: typecheck + build
        run: npm run build

  # Full workspace compile smoke on the platform whose webview matches ours.
  tauri-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace --locked
